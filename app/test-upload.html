<!DOCTYPE html>
<html>
<body>
  <h2>Test Upload Dossier</h2>
  <input type="file" id="fileInput" multiple>
  <button onclick="testUpload()">Tester Upload</button>
  
  <script>
    async function testUpload() {
      const input = document.getElementById('fileInput');
      const file = input.files[0];
      
      if (!file) {
        alert('Sélectionnez un fichier');
        return;
      }
      
      console.log('Fichier sélectionné:', file.name, file.size, file.type);
      
      const formData = new FormData();
      formData.append('dossier', file);
      formData.append('nomEleve', 'TEST_KOUAME');
      formData.append('matricule', 'TEST_123');
      
      try {
        const response = await fetch('api/upload-dossier', {
          method: 'POST',
          body: formData
        });
        
        const result = await response.json();
        console.log('Résultat:', result);
        alert(JSON.stringify(result, null, 2));
        
      } catch (error) {
        console.error('Erreur:', error);
        alert('Erreur: ' + error.message);
      }
    }
  </script>
</body>
</html>
